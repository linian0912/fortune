<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>命理推算 · Cyber Destiny</title>
<style>
/* ============================================
   CYBER MYSTIC THEME — 赛博神秘风
   ============================================ */
:root {
  --bg-deep: #06060f;
  --bg-space: #0a0a1e;
  --glass: rgba(12, 12, 36, 0.65);
  --glass-hover: rgba(16, 16, 48, 0.8);
  --border-glow: rgba(100, 60, 255, 0.25);
  --cyan: #00e5ff;
  --cyan-dim: #0088aa;
  --purple: #a855f7;
  --purple-deep: #7c3aed;
  --pink: #ff2d95;
  --gold: #ffd700;
  --gold-dim: #b8960f;
  --text: #d4d4f0;
  --text-dim: #7a7a9e;
  --text-bright: #f0f0ff;
  --shadow-glow: 0 0 20px rgba(124,58,237,0.3), 0 0 60px rgba(0,229,255,0.1);
  --radius: 16px;
  --radius-sm: 10px;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --font-title: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-title);
  background: var(--bg-deep);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
}

/* ===== 星空粒子背景 ===== */
#starfield {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(124,58,237,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 80%, rgba(0,229,255,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(255,45,149,0.04) 0%, transparent 60%);
  pointer-events: none;
  z-index: 1;
}

/* ===== 主容器 ===== */
.main-container {
  position: relative;
  z-index: 2;
  max-width: 800px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}

/* ===== Hero 区域 ===== */
.hero {
  text-align: center;
  padding: 60px 20px 40px;
}
.hero .cosmic-symbol {
  font-size: 56px;
  margin-bottom: 16px;
  animation: float 4s ease-in-out infinite;
  filter: drop-shadow(0 0 20px rgba(168,85,247,0.6));
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}
.hero h1 {
  font-size: 42px;
  font-weight: 800;
  letter-spacing: 8px;
  background: linear-gradient(135deg, var(--cyan), var(--purple), var(--pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}
.hero .subtitle {
  font-size: 13px;
  letter-spacing: 6px;
  color: var(--text-dim);
  text-transform: uppercase;
}

/* ===== 玻璃卡片 ===== */
.glass-card {
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border-glow);
  border-radius: var(--radius);
  box-shadow: var(--shadow-glow);
  transition: var(--transition);
}
.glass-card:hover {
  border-color: rgba(168,85,247,0.4);
  box-shadow: 0 0 30px rgba(124,58,237,0.4), 0 0 80px rgba(0,229,255,0.15);
}

/* ===== 输入卡片 ===== */
.input-card {
  padding: 36px;
  margin-bottom: 32px;
}
.input-card .section-label {
  font-size: 11px;
  letter-spacing: 4px;
  color: var(--cyan);
  text-transform: uppercase;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.input-card .section-label::before {
  content: '';
  width: 20px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan));
}
.input-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}
@media (max-width: 600px) { .input-grid { grid-template-columns: repeat(2, 1fr); } }
.input-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.input-group label {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--text-dim);
  text-transform: uppercase;
}
.input-group input {
  padding: 13px 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-sm);
  color: var(--text-bright);
  font-size: 15px;
  font-family: var(--font-title);
  transition: var(--transition);
  width: 100%;
  outline: none;
}
.input-group input:focus {
  border-color: var(--purple);
  box-shadow: 0 0 12px rgba(168,85,247,0.3);
  background: rgba(255,255,255,0.06);
}
.input-group input::placeholder { color: rgba(255,255,255,0.15); }

/* ===== 选项行 ===== */
.option-row {
  display: flex;
  gap: 24px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 24px;
}
.option-group {
  display: flex;
  align-items: center;
  gap: 8px;
}
.opt-label {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--text-dim);
}
.neon-pills {
  display: flex;
  gap: 2px;
  background: rgba(255,255,255,0.04);
  border-radius: 10px;
  padding: 3px;
  border: 1px solid rgba(255,255,255,0.06);
}
.neon-pill {
  padding: 8px 18px;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  transition: var(--transition);
  border: none;
  background: transparent;
  color: var(--text-dim);
  font-family: var(--font-title);
}
.neon-pill.active {
  background: linear-gradient(135deg, rgba(124,58,237,0.4), rgba(0,229,255,0.2));
  color: var(--text-bright);
  box-shadow: 0 0 12px rgba(124,58,237,0.3);
}
.neon-pill:hover:not(.active) { color: var(--text); }

/* ===== 模式切换标签 ===== */
.mode-tabs {
  display: flex;
  justify-content: center;
  gap: 0;
  margin-bottom: 32px;
}
.mode-tab {
  padding: 14px 36px;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 3px;
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.02);
  color: var(--text-dim);
  transition: var(--transition);
  font-family: var(--font-title);
  position: relative;
  overflow: hidden;
}
.mode-tab:first-child { border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
.mode-tab:last-child { border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
.mode-tab.active {
  background: linear-gradient(135deg, rgba(124,58,237,0.25), rgba(0,229,255,0.1));
  color: var(--text-bright);
  border-color: var(--purple);
  box-shadow: 0 0 20px rgba(124,58,237,0.2);
  z-index: 1;
}
.mode-tab.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 20%; right: 20%;
  height: 2px;
  background: var(--cyan);
  box-shadow: 0 0 10px var(--cyan);
}
.mode-tab:not(.active):hover { color: var(--text); border-color: rgba(255,255,255,0.15); }

/* ===== 提交按钮 ===== */
.submit-btn {
  padding: 16px 48px;
  background: linear-gradient(135deg, var(--purple-deep), var(--purple));
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 4px;
  cursor: pointer;
  font-family: var(--font-title);
  transition: var(--transition);
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 20px rgba(124,58,237,0.4);
}
.submit-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 30px rgba(124,58,237,0.6), 0 0 60px rgba(0,229,255,0.2);
}
.submit-btn:active { transform: translateY(0); }
.submit-btn:disabled {
  opacity: 0.5;
  cursor: wait;
  transform: none;
}
.submit-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  transition: left 0.5s;
}
.submit-btn:hover::before { left: 100%; }

/* ===== 结果容器 ===== */
.results-container {
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
}
.results-container.visible { opacity: 1; transform: translateY(0); }

/* ===== 八字卡片 ===== */
.bazi-card {
  padding: 32px;
}
.bazi-card .card-meta {
  text-align: center;
  margin-bottom: 24px;
  font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 1px;
}
.bazi-card .card-meta span {
  color: var(--cyan);
  font-weight: 600;
}

/* 四柱表格 */
.pillar-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: rgba(255,255,255,0.04);
  border-radius: var(--radius-sm);
  overflow: hidden;
  margin-bottom: 20px;
}
.pillar-grid .pg-cell {
  background: rgba(12,12,36,0.8);
  padding: 18px 12px;
  text-align: center;
}
.pillar-grid .pg-head {
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--text-dim);
  text-transform: uppercase;
  padding: 10px;
  background: rgba(124,58,237,0.1);
}
.pillar-grid .pg-gz {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: 4px;
}
.pillar-grid .pg-gz.day-master {
  background: linear-gradient(135deg, var(--pink), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  filter: drop-shadow(0 0 8px rgba(255,45,149,0.5));
}
.pillar-grid .pg-shen {
  font-size: 14px;
  font-weight: 600;
  color: var(--cyan);
  margin-top: 4px;
}
.pillar-grid .pg-nayin {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
}

/* 信息行 */
.info-row {
  display: flex;
  justify-content: center;
  gap: 32px;
  flex-wrap: wrap;
  margin: 16px 0;
  font-size: 13px;
}
.info-item {
  display: flex;
  align-items: center;
  gap: 6px;
}
.info-item .label { color: var(--text-dim); }
.info-item .value { color: var(--text-bright); font-weight: 600; }
.info-item .value.highlight { color: var(--pink); }

/* 五行条 */
.wx-section { margin: 24px 0; }
.wx-section .section-title {
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--cyan);
  margin-bottom: 14px;
  text-transform: uppercase;
}
.wx-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 10px 0;
}
.wx-name {
  width: 20px;
  font-weight: 700;
  font-size: 14px;
}
.wx-track {
  flex: 1;
  height: 6px;
  background: rgba(255,255,255,0.05);
  border-radius: 3px;
  overflow: hidden;
}
.wx-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 1s cubic-bezier(0.22, 1, 0.36, 1);
  box-shadow: 0 0 8px currentColor;
}
.wx-val {
  width: 20px;
  font-size: 11px;
  color: var(--text-dim);
  text-align: right;
  font-weight: 600;
}

/* 大运 */
.dayun-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin: 12px 0;
}
@media (max-width: 500px) { .dayun-grid { grid-template-columns: repeat(2, 1fr); } }
.dayun-item {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius-sm);
  padding: 14px 8px;
  text-align: center;
  transition: var(--transition);
}
.dayun-item:hover {
  border-color: var(--purple);
  box-shadow: 0 0 12px rgba(124,58,237,0.2);
}
.dayun-item .dy-age {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 1px;
}
.dayun-item .dy-gz {
  font-size: 19px;
  font-weight: 700;
  color: var(--text-bright);
  margin-top: 4px;
}

/* 藏干表 */
.cg-table {
  width: 100%;
  border-collapse: collapse;
  margin: 10px 0;
  font-size: 13px;
}
.cg-table th {
  text-align: left;
  padding: 10px 14px;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--text-dim);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.cg-table td {
  padding: 10px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  color: var(--text);
}

/* ===== 紫微卡片 ===== */
.ziwei-card {
  padding: 32px;
}
.ziwei-card .zw-meta {
  text-align: center;
  margin-bottom: 20px;
  font-size: 13px;
  line-height: 2;
}
.ziwei-card .zw-meta .hl {
  color: var(--cyan);
  font-weight: 700;
  font-size: 16px;
}

/* 四化 */
.sihua-bar {
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
  margin: 16px 0;
}
.sihua-badge {
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  border: 1px solid;
}
.badge-lu { background: rgba(34,197,94,0.1); color: #22c55e; border-color: rgba(34,197,94,0.3); }
.badge-quan { background: rgba(234,179,8,0.1); color: #eab308; border-color: rgba(234,179,8,0.3); }
.badge-ke { background: rgba(59,130,246,0.1); color: #3b82f6; border-color: rgba(59,130,246,0.3); }
.badge-ji { background: rgba(239,68,68,0.1); color: #ef4444; border-color: rgba(239,68,68,0.3); }

/* 紫微命盘 - 圆形布局 */
.zw-orbit {
  position: relative;
  width: 440px;
  height: 440px;
  margin: 20px auto;
}
@media (max-width: 500px) { .zw-orbit { width: 340px; height: 340px; } }
.zw-ring {
  position: absolute;
  inset: 20px;
  border-radius: 50%;
  border: 1.5px solid rgba(124,58,237,0.2);
  box-shadow: 0 0 30px rgba(124,58,237,0.15), inset 0 0 30px rgba(0,229,255,0.05);
}
.zw-ring-2 {
  position: absolute;
  inset: 60px;
  border-radius: 50%;
  border: 1px dashed rgba(255,255,255,0.06);
}
.zw-center {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 64px; height: 64px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(124,58,237,0.3), rgba(0,229,255,0.1));
  border: 1.5px solid rgba(124,58,237,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  box-shadow: 0 0 30px rgba(124,58,237,0.4);
}
.zw-center .center-icon {
  font-size: 20px;
  color: var(--cyan);
}
.zw-center .center-text {
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 1px;
}

.zw-node {
  position: absolute;
  transform: translate(-50%, -50%);
  text-align: center;
  width: 74px;
  font-size: 10px;
  transition: var(--transition);
}
.zw-node.highlight {
  background: rgba(124,58,237,0.12);
  border-radius: 8px;
  border: 1px dashed rgba(168,85,247,0.4);
  padding: 4px;
  box-shadow: 0 0 12px rgba(124,58,237,0.2);
}
.zw-node .n-name {
  font-weight: 700;
  font-size: 11px;
  color: var(--text-bright);
}
.zw-node .n-gz {
  font-size: 9px;
  color: var(--text-dim);
}
.zw-node .n-stars {
  font-size: 9px;
  line-height: 1.3;
  margin-top: 2px;
}
.zw-node .n-stars .star {
  display: block;
}
.zw-node .n-stars .star.main {
  color: var(--pink);
  font-weight: 600;
}
.zw-node .n-stars .star.aux {
  color: var(--text-dim);
}
.zw-tag {
  display: inline-block;
  font-size: 8px;
  padding: 1px 5px;
  border-radius: 3px;
  margin: 0 1px;
}
.zw-tag.ming { background: rgba(124,58,237,0.3); color: var(--purple); }
.zw-tag.shen { background: rgba(0,229,255,0.15); color: var(--cyan); }

/* ===== 空状态 ===== */
.empty-state {
  text-align: center;
  padding: 80px 20px;
}
.empty-state .icon {
  font-size: 56px;
  margin-bottom: 16px;
  opacity: 0.5;
  animation: float 4s ease-in-out infinite;
}
.empty-state p {
  font-size: 13px;
  color: var(--text-dim);
  letter-spacing: 2px;
  line-height: 2;
}
.loading-state {
  text-align: center;
  padding: 60px;
}
.loading-ring {
  width: 40px; height: 40px;
  border: 2px solid rgba(255,255,255,0.05);
  border-top-color: var(--purple);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
  box-shadow: 0 0 20px rgba(124,58,237,0.3);
}
@keyframes spin { to { transform: rotate(360deg); } }
.fade-in { animation: fadeIn 0.5s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }


/* ===== 统一日期选择器 ===== */
.datetime-wrapper {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.datetime-wrapper input[type="datetime-local"] {
  flex: 1;
  min-width: 240px;
  padding: 15px 18px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-sm);
  color: var(--text-bright);
  font-size: 16px;
  font-family: var(--font-title);
  transition: var(--transition);
  outline: none;
  color-scheme: dark;
}
.datetime-wrapper input[type="datetime-local"]:focus {
  border-color: var(--purple);
  box-shadow: 0 0 16px rgba(168,85,247,0.3);
  background: rgba(255,255,255,0.06);
}
.datetime-wrapper input[type="datetime-local"]::-webkit-calendar-picker-indicator {
  filter: invert(0.7) sepia(1) saturate(5) hue-rotate(230deg);
  cursor: pointer;
}
.shichen-display {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 18px;
  background: rgba(124,58,237,0.1);
  border: 1px solid rgba(124,58,237,0.3);
  border-radius: var(--radius-sm);
  white-space: nowrap;
}
.shichen-display .sc-dot {
  width: 8px; height: 8px;
  background: var(--cyan);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--cyan);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot { 0%,100%{opacity:0.6} 50%{opacity:1} }
.shichen-display .sc-text {
  font-size: 18px;
  font-weight: 700;
  color: var(--cyan);
}
.shichen-display .sc-range {
  font-size: 11px;
  color: var(--text-dim);
}
/* ===== 底部 ===== */
.footer {
  text-align: center;
  padding: 32px;
  color: rgba(255,255,255,0.1);
  font-size: 11px;
  letter-spacing: 3px;
}
</style>
</head>
<body>

<!-- 星空背景 -->
<canvas id="starfield"></canvas>

<div class="main-container">

  <!-- Hero -->
  <section class="hero">
    <div class="cosmic-symbol">☯</div>
    <h1>命 理 推 算</h1>
    <p class="subtitle">Cyber Destiny · 赛博命理</p>
  </section>

  <!-- 输入卡片 -->
  <section class="glass-card input-card">
    <div class="section-label">⏣ 出生信息</div>
    <div class="mode-tabs">
      <div class="mode-tab active" data-mode="bazi" onclick="switchMode('bazi')">四柱八字</div>
      <div class="mode-tab" data-mode="ziwei" onclick="switchMode('ziwei')">紫微斗数</div>
    </div>
    <div class="input-grid">
      <div class="input-group" style="grid-column: 1 / -1;">
        <label>出生日期 & 时辰</label>
        <div class="datetime-wrapper">
          <input type="datetime-local" id="birthday" value="1990-05-20T14:00"
                 min="1900-01-01T00:00" max="2100-12-31T23:59"
                 step="3600">
          <div class="shichen-display" id="shichen-display">
            <span class="sc-dot"></span>
            <span class="sc-text">未时</span>
            <span class="sc-range">13:00-15:00</span>
          </div>
        </div>
      </div>
    </div>
    <div class="option-row">
      <div class="option-group">
        <span class="opt-label">性别</span>
        <div class="neon-pills" id="gender-pills">
          <button class="neon-pill active" data-value="male">男</button>
          <button class="neon-pill" data-value="female">女</button>
        </div>
      </div>
      <div class="option-group">
        <span class="opt-label">日历</span>
        <div class="neon-pills" id="lunar-pills">
          <button class="neon-pill active" data-value="false">公历</button>
          <button class="neon-pill" data-value="true">农历</button>
        </div>
      </div>
      <button class="submit-btn" onclick="calculate()">开 始 推 算</button>
    </div>
  </section>

  <!-- 结果 -->
  <div class="results-container" id="results">
    <div class="empty-state">
      <div class="icon">✦</div>
      <p>输入出生信息，点击「开始推算」<br>揭开你的命理密码</p>
    </div>
  </div>
</div>

<footer class="footer">四柱八字 · 紫微斗数 · Cyber Destiny</footer>

<script>
// ============================================
// 星空粒子背景
// ============================================
(function() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.8 + 0.3,
      twinkle: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.02 + 0.005,
      opacity: Math.random() * 0.6 + 0.3,
    });
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.twinkle += s.speed;
      const alpha = s.opacity + Math.sin(s.twinkle) * 0.2;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180,160,255,${alpha})`;
      ctx.fill();
      // Glow
      if (s.r > 1.2) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * 2.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(124,58,237,${alpha * 0.15})`;
        ctx.fill();
      }
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ============================================
// 药丸按钮
// ============================================
document.querySelectorAll('.neon-pills, .pills').forEach(group => {
  group.addEventListener('click', e => {
    const btn = e.target.closest('.neon-pill, .pill');
    if (!btn) return;
    group.querySelectorAll('.neon-pill, .pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// ============================================
// 模式切换
// ============================================
let currentMode = 'bazi';
function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.mode === mode);
  });
  const results = document.getElementById('results');
  if (results._lastData) {
    renderResults(results._lastData, results._lastFd);
  }
}

// 时辰映射
const SHI_CHEN_LIST = [
  {name:'子',range:'23:00-01:00', start:23, end:1},
  {name:'丑',range:'01:00-03:00', start:1, end:3},
  {name:'寅',range:'03:00-05:00', start:3, end:5},
  {name:'卯',range:'05:00-07:00', start:5, end:7},
  {name:'辰',range:'07:00-09:00', start:7, end:9},
  {name:'巳',range:'09:00-11:00', start:9, end:11},
  {name:'午',range:'11:00-13:00', start:11, end:13},
  {name:'未',range:'13:00-15:00', start:13, end:15},
  {name:'申',range:'15:00-17:00', start:15, end:17},
  {name:'酉',range:'17:00-19:00', start:17, end:19},
  {name:'戌',range:'19:00-21:00', start:19, end:21},
  {name:'亥',range:'21:00-23:00', start:21, end:23},
];

function getShiChen(hour) {
  const h = hour % 24;
  if (h === 23 || h === 0) return SHI_CHEN_LIST[0];
  for (let i = 1; i < SHI_CHEN_LIST.length; i++) {
    if (h >= SHI_CHEN_LIST[i].start && h < SHI_CHEN_LIST[i].end) return SHI_CHEN_LIST[i];
  }
  return SHI_CHEN_LIST[0];
}

function updateShiChenDisplay() {
  const dtVal = document.getElementById('birthday').value;
  if (!dtVal) return;
  const dt = new Date(dtVal);
  const sc = getShiChen(dt.getHours());
  document.getElementById('shichen-display').innerHTML = `
    <span class="sc-dot"></span>
    <span class="sc-text">${sc.name}时</span>
    <span class="sc-range">${sc.range}</span>
  `;
}

// 监听日期变更
document.getElementById('birthday').addEventListener('change', updateShiChenDisplay);
document.getElementById('birthday').addEventListener('input', updateShiChenDisplay);

function getFormData() {
  const dtVal = document.getElementById('birthday').value;
  let year, month, day, hour;
  if (dtVal) {
    const dt = new Date(dtVal);
    year = dt.getFullYear();
    month = dt.getMonth() + 1;
    day = dt.getDate();
    hour = dt.getHours();
  } else {
    year = month = day = hour = 0;
  }
  return {
    year, month, day, hour,
    gender: document.querySelector('#gender-pills .neon-pill.active').dataset.value,
    lunar: document.querySelector('#lunar-pills .neon-pill.active').dataset.value,
  };
}

// ============================================
// 主计算
// ============================================
async function calculate() {
  const fd = getFormData();
  if (!fd.year || !fd.month || !fd.day) return;

  const btn = document.querySelector('.submit-btn');
  btn.disabled = true;
  btn.textContent = '推算中...';

  const results = document.getElementById('results');
  results.classList.remove('visible');
  results.innerHTML = '<div class="loading-state"><div class="loading-ring"></div><p style="color:var(--text-dim);font-size:12px">正在连接命理矩阵...</p></div>';

  try {
    const resp = await fetch('/api/fortune', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: `year=${fd.year}&month=${fd.month}&day=${fd.day}&hour=${fd.hour}&gender=${fd.gender}&lunar=${fd.lunar}`
    });
    const data = await resp.json();
    results._lastData = data;
    results._lastFd = fd;
    renderResults(data, fd);
    results.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } catch (e) {
    results.innerHTML = `<div class="loading-state"><p style="color:var(--pink)">❌ 连接失败<br><small style="color:var(--text-dim)">请确保 python3 server.py 已启动</small></p></div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '开 始 推 算';
  }
}

function renderResults(data, fd) {
  const results = document.getElementById('results');
  results.innerHTML = '';
  if (currentMode === 'bazi') {
    results.appendChild(buildBaziCard(data.bazi, fd));
  } else {
    results.appendChild(buildZiweiCard(data.ziwei));
  }
  requestAnimationFrame(() => results.classList.add('visible'));
}

// ============================================
// 八字卡片
// ============================================
function buildBaziCard(bazi, fd) {
  const card = document.createElement('div');
  card.className = 'glass-card bazi-card fade-in';

  if (!bazi || bazi.error) {
    card.innerHTML = `<div class="section-label">⏣ 错误</div><p style="color:var(--pink)">${bazi?.error||'数据异常'}</p>`;
    return card;
  }

  const p = bazi.pillars;
  const wx = bazi.wu_xing;
  const maxWx = Math.max(...Object.values(wx), 1);
  const wxColors = { '金':'#eab308','木':'#22c55e','水':'#3b82f6','火':'#ef4444','土':'#f97316' };

  // 大运
  let dayunHtml = '';
  for (let i = 0; i < Math.min(bazi.da_yun.length, 8); i++) {
    const d = bazi.da_yun[i];
    dayunHtml += `<div class="dayun-item"><div class="dy-age">${d.age}岁</div><div class="dy-gz">${d.gz}</div></div>`;
  }

  // 五行
  let wxHtml = '';
  for (const [n, c] of Object.entries(wx)) {
    wxHtml += `<div class="wx-row">
      <span class="wx-name" style="color:${wxColors[n]}">${n}</span>
      <div class="wx-track"><div class="wx-fill" style="width:${c/maxWx*100}%;background:${wxColors[n]}"></div></div>
      <span class="wx-val">${c}</span>
    </div>`;
  }

  // 藏干
  let cgRows = '';
  for (const [k, v] of Object.entries(bazi.cang_gan_detail || {})) {
    const short = k.replace(/[年月日时]支/, '');
    cgRows += `<tr><td>${short}</td><td>${v.join(' · ')}</td></tr>`;
  }

  const strong = bazi.wu_xing[bazi.day_wx] >= 3 ? '偏旺' : '偏弱';

  card.innerHTML = `
    <div class="section-label">⏣ 四柱八字 · ${fd.gender==='male'?'乾造':'坤造'}</div>
    <div class="card-meta">
      <span>${fd.year}.${fd.month}.${fd.day}</span> · ${fd.hour}时 · 属<span>${bazi.sheng_xiao}</span> · 农历 <span>${bazi.lunar_date}</span>
    </div>

    <div class="pillar-grid">
      <div class="pg-cell pg-head">年柱</div>
      <div class="pg-cell pg-head">月柱</div>
      <div class="pg-cell pg-head">日柱</div>
      <div class="pg-cell pg-head">时柱</div>
      <div class="pg-cell"><div class="pg-gz">${p.year}</div><div class="pg-shen">${bazi.shi_shen['年']}</div><div class="pg-nayin">${bazi.na_yin['年']}</div></div>
      <div class="pg-cell"><div class="pg-gz">${p.month}</div><div class="pg-shen">${bazi.shi_shen['月']}</div><div class="pg-nayin">${bazi.na_yin['月']}</div></div>
      <div class="pg-cell"><div class="pg-gz day-master">${p.day}</div><div class="pg-shen">日主</div><div class="pg-nayin">${bazi.na_yin['日']}</div></div>
      <div class="pg-cell"><div class="pg-gz">${p.hour}</div><div class="pg-shen">${bazi.shi_shen['时']}</div><div class="pg-nayin">${bazi.na_yin['时']}</div></div>
    </div>

    <div class="info-row">
      <div class="info-item"><span class="label">日主</span><span class="value highlight">${bazi.day_master}</span></div>
      <div class="info-item"><span class="label">强弱</span><span class="value" style="color:${strong==='偏旺'?'#f97316':'#3b82f6'}">${strong}</span></div>
    </div>

    <div class="wx-section">
      <div class="section-title">⏣ 五行分布</div>
      ${wxHtml}
    </div>

    <div class="wx-section">
      <div class="section-title">⏣ 地支藏干</div>
      <table class="cg-table"><tr><th>地支</th><th>藏干</th></tr>${cgRows}</table>
    </div>

    <div class="wx-section">
      <div class="section-title">⏣ 大运排盘</div>
      <div class="dayun-grid">${dayunHtml}</div>
    </div>`;
  return card;
}

// ============================================
// 紫微卡片
// ============================================
function buildZiweiCard(ziwei) {
  const card = document.createElement('div');
  card.className = 'glass-card ziwei-card fade-in';

  if (!ziwei || ziwei.error) {
    card.innerHTML = `<div class="section-label">⏣ 错误</div><p style="color:var(--pink)">${ziwei?.error||'数据异常'}</p>`;
    return card;
  }

  const mainStars = new Set(['紫微','天机','太阳','武曲','天同','廉贞','天府','太阴','贪狼','巨门','天相','天梁','七杀','破军']);
  const gongMap = {};
  ziwei.gongs.forEach(g => { gongMap[g.zhi] = g; });

  // 12宫角度
  const posMap = {
    '巳':300,'午':330,'未':0,'申':30,
    '辰':270,'酉':60,
    '卯':240,'戌':90,
    '寅':210,'丑':180,'子':150,'亥':120,
  };
  const cx = 220, cy = 220, r = 150;

  let nodesHtml = '';
  for (const zhi of Object.keys(posMap)) {
    const g = gongMap[zhi];
    if (!g) continue;
    const angle = posMap[zhi];
    const rad = angle * Math.PI / 180;
    const x = cx + r * Math.sin(rad);
    const y = cy - r * Math.cos(rad);
    const isImp = g.is_ming || g.is_shen;

    let starsHtml = '';
    g.stars.forEach(s => {
      const clean = s.replace(/^[禄权科忌]/,'');
      const isMain = mainStars.has(clean);
      let cls = isMain ? 'main' : 'aux';
      if (s.startsWith('禄')) cls = 'main';
      if (s.startsWith('权')) cls = 'main';
      if (s.startsWith('科')) cls = 'main';
      if (s.startsWith('忌')) cls = 'main';
      starsHtml += `<span class="star ${cls}">${s}</span>`;
    });

    let tags = '';
    if (g.is_ming) tags += '<span class="zw-tag ming">命</span>';
    if (g.is_shen) tags += '<span class="zw-tag shen">身</span>';

    nodesHtml += `<div class="zw-node${isImp?' highlight':''}" style="left:${x}px;top:${y}px">
      <div class="n-name">${g.name} ${tags}</div>
      <div class="n-gz">${g.gz} (${zhi})</div>
      <div class="n-stars">${starsHtml||'<span class="star aux">—</span>'}</div>
    </div>`;
  }

  let sihuaHtml = '';
  if (ziwei.si_hua) {
    const clsMap = {'化禄':'badge-lu','化权':'badge-quan','化科':'badge-ke','化忌':'badge-ji'};
    for (const [k, v] of Object.entries(ziwei.si_hua)) {
      if (!v) continue;
      sihuaHtml += `<span class="sihua-badge ${clsMap[k]}">${k}: ${v}</span>`;
    }
  }

  card.innerHTML = `
    <div class="section-label">⏣ 紫微斗数</div>
    <div class="zw-meta">
      命宫 <span class="hl">${ziwei.ming_gong}</span> · 五行局 <span class="hl">${ziwei.wx_ju}</span> · 身宫 <span class="hl">${ziwei.shen_gong_name}</span>
    </div>
    <div class="sihua-bar">${sihuaHtml}</div>
    <div class="zw-orbit">
      <div class="zw-ring"></div>
      <div class="zw-ring-2"></div>
      <div class="zw-center">
        <span class="center-icon">✦</span>
        <span class="center-text">命盘</span>
      </div>
      ${nodesHtml}
    </div>`;
  return card;
}
</script>
</body>
</html>
