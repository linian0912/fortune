<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>命理推算 · Cyber Destiny</title>
<style>
/* ============================================
   CYBERPUNK WU-XING THEME — 赛博朋克·五行霓虹
   底色: #121214  五行色: 金=金霓虹 木=绿霓虹 水=青霓虹 火=红霓虹 土=琥珀霓虹
   ============================================ */
:root {
  --bg-deep: #121214;
  --bg-card: rgba(22, 22, 28, 0.78);
  --bg-card-hover: rgba(28, 28, 36, 0.9);
  --border-glow: rgba(255, 215, 0, 0.15);
  --border-card: rgba(255, 255, 255, 0.06);

  /* 五行霓虹色 - 赛博朋克调色盘 */
  --wx-gold:   #FFC107;   /* 金 - 黄金融金 */
  --wx-green:  #00FF41;   /* 木 - 矩阵绿 */
  --wx-cyan:   #00E5FF;   /* 水 - 霓虹青 */
  --wx-red:    #FF3131;   /* 火 - 烈焰红 */
  --wx-amber:  #FFB000;   /* 土 - 琥珀橙 */

  --text: #e0e0e8;
  --text-dim: #6a6a7a;
  --text-bright: #ffffff;
  --radius: 14px;
  --radius-sm: 8px;
  --transition: 0.28s cubic-bezier(0.4, 0, 0.2, 1);
  --font-title: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-title);
  background: var(--bg-deep);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
  position: relative;
}

/* ===== 扫线效果 ===== */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 10;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
}

/* ===== 背景光芒 ===== */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  background:
    radial-gradient(ellipse at 20% 15%, rgba(255, 193, 7, 0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 25%, rgba(0, 229, 255, 0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 70%, rgba(255, 49, 49, 0.03) 0%, transparent 50%),
    radial-gradient(ellipse at 30% 85%, rgba(0, 255, 65, 0.04) 0%, transparent 50%);
}

/* ===== 星空粒子 ===== */
#starfield {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ===== 主容器 ===== */
.main-container {
  position: relative;
  z-index: 2;
  max-width: 820px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}

/* ===== Hero ===== */
.hero {
  text-align: center;
  padding: 50px 20px 30px;
}
.hero .cosmic-symbol {
  font-size: 50px;
  margin-bottom: 12px;
  animation: float 4s ease-in-out infinite;
  filter: drop-shadow(0 0 16px rgba(255, 193, 7, 0.5));
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
.hero h1 {
  font-size: 40px;
  font-weight: 900;
  letter-spacing: 10px;
  background: linear-gradient(135deg, var(--wx-gold), var(--wx-cyan), var(--wx-red));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
  filter: drop-shadow(0 0 8px rgba(255, 193, 7, 0.3));
}
.hero .subtitle {
  font-size: 11px;
  letter-spacing: 8px;
  color: var(--text-dim);
  text-transform: uppercase;
}

/* ===== 玻璃卡片 ===== */
.glass-card {
  background: var(--bg-card);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border-card);
  border-radius: var(--radius);
  box-shadow:
    0 0 20px rgba(255, 193, 7, 0.05),
    0 0 40px rgba(0, 229, 255, 0.03);
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}
.glass-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg,
    transparent,
    var(--wx-gold),
    var(--wx-cyan),
    var(--wx-gold),
    transparent
  );
  opacity: 0.4;
}
.glass-card:hover {
  border-color: rgba(255, 193, 7, 0.2);
  box-shadow:
    0 0 30px rgba(255, 193, 7, 0.08),
    0 0 60px rgba(0, 229, 255, 0.05);
}

/* ===== 输入卡片 ===== */
.input-card { padding: 32px; margin-bottom: 28px; }
.section-label {
  font-size: 10px;
  letter-spacing: 5px;
  color: var(--wx-cyan);
  text-transform: uppercase;
  margin-bottom: 22px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-label::before {
  content: '';
  width: 18px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--wx-cyan));
}
.input-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 20px;
}
@media (max-width: 600px) { .input-grid { grid-template-columns: repeat(2, 1fr); } }
.input-group { display: flex; flex-direction: column; gap: 6px; }
.input-group label {
  font-size: 9px; letter-spacing: 3px;
  color: var(--text-dim); text-transform: uppercase;
}
.input-group input {
  padding: 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius-sm);
  color: var(--text-bright);
  font-size: 15px;
  font-family: var(--font-title);
  transition: var(--transition);
  width: 100%;
  outline: none;
}
.input-group input:focus {
  border-color: var(--wx-gold);
  box-shadow: 0 0 14px rgba(255, 193, 7, 0.2);
  background: rgba(255,255,255,0.05);
}
.input-group input::placeholder { color: rgba(255,255,255,0.1); }

/* ===== 日期时间选择器 ===== */
.datetime-wrapper {
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
}
.datetime-wrapper input[type="datetime-local"] {
  flex: 1; min-width: 240px;
  padding: 15px 18px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius-sm);
  color: var(--text-bright);
  font-size: 16px;
  font-family: var(--font-title);
  outline: none;
  color-scheme: dark;
}
.datetime-wrapper input[type="datetime-local"]:focus {
  border-color: var(--wx-gold);
  box-shadow: 0 0 16px rgba(255, 193, 7, 0.2);
  background: rgba(255,255,255,0.05);
}
.datetime-wrapper input[type="datetime-local"]::-webkit-calendar-picker-indicator {
  filter: invert(0.8) sepia(1) saturate(5) hue-rotate(10deg);
  cursor: pointer;
}
.shichen-display {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 16px;
  background: rgba(255, 193, 7, 0.06);
  border: 1px solid rgba(255, 193, 7, 0.2);
  border-radius: var(--radius-sm);
  white-space: nowrap;
}
.shichen-display .sc-dot {
  width: 7px; height: 7px;
  background: var(--wx-cyan);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--wx-cyan);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot { 0%,100%{opacity:0.5} 50%{opacity:1} }
.shichen-display .sc-text {
  font-size: 18px; font-weight: 800; color: var(--wx-cyan);
}
.shichen-display .sc-range {
  font-size: 10px; color: var(--text-dim);
}

/* ===== 选项行 ===== */
.option-row {
  display: flex; gap: 20px; align-items: center; flex-wrap: wrap; margin-bottom: 20px;
}
.option-group { display: flex; align-items: center; gap: 8px; }
.opt-label {
  font-size: 10px; letter-spacing: 3px; color: var(--text-dim);
}
.neon-pills {
  display: flex; gap: 2px;
  background: rgba(255,255,255,0.03);
  border-radius: 9px; padding: 3px;
  border: 1px solid rgba(255,255,255,0.05);
}
.neon-pill {
  padding: 8px 16px;
  border-radius: 7px;
  font-size: 13px;
  cursor: pointer;
  transition: var(--transition);
  border: none;
  background: transparent;
  color: var(--text-dim);
  font-family: var(--font-title);
  font-weight: 500;
}
.neon-pill.active {
  background: rgba(255, 193, 7, 0.12);
  color: var(--wx-gold);
  box-shadow: 0 0 10px rgba(255, 193, 7, 0.2);
  text-shadow: 0 0 6px rgba(255, 193, 7, 0.5);
}
.neon-pill:hover:not(.active) { color: var(--text); }

/* ===== 模式切换标签 ===== */
.mode-tabs {
  display: flex; justify-content: center; gap: 0; margin-bottom: 28px;
}
.mode-tab {
  padding: 13px 32px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 3px;
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.02);
  color: var(--text-dim);
  transition: var(--transition);
  font-family: var(--font-title);
  position: relative;
}
.mode-tab:first-child { border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
.mode-tab:last-child { border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
.mode-tab.active {
  background: rgba(0, 229, 255, 0.08);
  color: var(--wx-cyan);
  border-color: rgba(0, 229, 255, 0.3);
  box-shadow: 0 0 16px rgba(0, 229, 255, 0.15);
  z-index: 1;
  text-shadow: 0 0 8px rgba(0, 229, 255, 0.5);
}
.mode-tab.active::after {
  /* underline removed */
}
.mode-tab:not(.active):hover { color: var(--text); border-color: rgba(255,255,255,0.12); }

/* ===== 提交按钮 ===== */
.submit-btn {
  padding: 14px 40px;
  background: linear-gradient(135deg, rgba(255, 49, 49, 0.8), rgba(255, 176, 0, 0.8));
  color: #fff;
  border: 1px solid rgba(255, 176, 0, 0.4);
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 800;
  letter-spacing: 5px;
  cursor: pointer;
  font-family: var(--font-title);
  transition: var(--transition);
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 20px rgba(255, 49, 49, 0.3), 0 0 40px rgba(255, 176, 0, 0.1);
  text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
}
.submit-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 30px rgba(255, 49, 49, 0.5), 0 0 60px rgba(255, 176, 0, 0.2);
}
.submit-btn:active { transform: translateY(0); }
.submit-btn:disabled { opacity: 0.4; cursor: wait; transform: none; }
.submit-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  transition: left 0.5s;
}
.submit-btn:hover::before { left: 100%; }

/* ===== 结果容器 ===== */
.results-container {
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
}
.results-container.visible { opacity: 1; transform: translateY(0); }

/* ===== 卡片内标题行 ===== */
.card-meta {
  text-align: center;
  margin-bottom: 20px;
  font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 1px;
}
.card-meta span {
  color: var(--wx-gold);
  font-weight: 600;
}

/* ===== 四柱表格 ===== */
.bazi-card { padding: 28px; }
.pillar-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: rgba(255,255,255,0.03);
  border-radius: var(--radius-sm);
  overflow: hidden;
  margin-bottom: 18px;
}
.pillar-grid .pg-cell {
  background: rgba(22, 22, 28, 0.9);
  padding: 16px 10px;
  text-align: center;
}
.pillar-grid .pg-head {
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--text-dim);
  text-transform: uppercase;
  padding: 8px;
  background: rgba(255, 193, 7, 0.06);
}
.pillar-grid .pg-gz {
  font-size: 26px;
  font-weight: 900;
  letter-spacing: 4px;
}
.pillar-grid .pg-gz.day-master {
  color: var(--wx-red);
  text-shadow: 0 0 12px rgba(255, 49, 49, 0.6);
}
.pillar-grid .pg-shen {
  font-size: 13px; font-weight: 600;
  color: var(--wx-cyan);
  margin-top: 3px;
}
.pillar-grid .pg-nayin {
  font-size: 10px; color: var(--text-dim); margin-top: 2px;
}

/* ===== 信息行 ===== */
.info-row {
  display: flex; justify-content: center; gap: 28px;
  flex-wrap: wrap; margin: 14px 0; font-size: 13px;
}
.info-item { display: flex; align-items: center; gap: 6px; }
.info-item .label { color: var(--text-dim); }
.info-item .value { color: var(--text-bright); font-weight: 600; }
.info-item .value.highlight { color: var(--wx-red); }

/* ===== 五行条 ===== */
.wx-section { margin: 22px 0; }
.wx-section .section-title {
  font-size: 10px; letter-spacing: 4px;
  color: var(--wx-cyan); margin-bottom: 12px; text-transform: uppercase;
}
.wx-row { display: flex; align-items: center; gap: 10px; margin: 9px 0; }
.wx-name { width: 18px; font-weight: 800; font-size: 14px; }
.wx-track {
  flex: 1; height: 5px;
  background: rgba(255,255,255,0.04);
  border-radius: 3px; overflow: hidden;
}
.wx-fill {
  height: 100%; border-radius: 3px;
  transition: width 1s cubic-bezier(0.22, 1, 0.36, 1);
}
.wx-val {
  width: 18px; font-size: 10px;
  color: var(--text-dim); text-align: right; font-weight: 700;
}

/* ===== 大运 ===== */
.dayun-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 10px; margin: 12px 0;
}
@media (max-width: 500px) { .dayun-grid { grid-template-columns: repeat(2, 1fr); } }
.dayun-item {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: var(--radius-sm);
  padding: 12px 8px;
  text-align: center;
  transition: var(--transition);
}
.dayun-item:hover {
  border-color: var(--wx-cyan);
  box-shadow: 0 0 12px rgba(0, 229, 255, 0.15);
}
.dayun-item .dy-age { font-size: 9px; color: var(--text-dim); }
.dayun-item .dy-gz {
  font-size: 18px; font-weight: 700;
  color: var(--text-bright); margin-top: 3px;
}

/* ===== 藏干表 ===== */
.cg-table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 12px; }
.cg-table th {
  text-align: left; padding: 8px 12px;
  font-size: 9px; letter-spacing: 2px;
  color: var(--text-dim); border-bottom: 1px solid rgba(255,255,255,0.05);
}
.cg-table td {
  padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.02);
  color: var(--text);
}

/* ===== 紫微卡片 ===== */
.ziwei-card { padding: 28px; }
.zw-meta {
  text-align: center; margin-bottom: 18px;
  font-size: 12px; line-height: 2;
}
.zw-meta .hl {
  color: var(--wx-cyan); font-weight: 800; font-size: 15px;
}

/* ===== 四化徽章 ===== */
.sihua-bar {
  display: flex; justify-content: center; gap: 10px;
  flex-wrap: wrap; margin: 14px 0;
}
.sihua-badge {
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  border: 1px solid;
}
.badge-lu {
  background: rgba(0, 255, 65, 0.08); color: var(--wx-green);
  border-color: rgba(0, 255, 65, 0.3);
  text-shadow: 0 0 6px rgba(0, 255, 65, 0.4);
}
.badge-quan {
  background: rgba(255, 193, 7, 0.08); color: var(--wx-gold);
  border-color: rgba(255, 193, 7, 0.3);
  text-shadow: 0 0 6px rgba(255, 193, 7, 0.4);
}
.badge-ke {
  background: rgba(0, 229, 255, 0.08); color: var(--wx-cyan);
  border-color: rgba(0, 229, 255, 0.3);
  text-shadow: 0 0 6px rgba(0, 229, 255, 0.4);
}
.badge-ji {
  background: rgba(255, 49, 49, 0.08); color: var(--wx-red);
  border-color: rgba(255, 49, 49, 0.3);
  text-shadow: 0 0 6px rgba(255, 49, 49, 0.4);
}

/* ===== 紫微命盘 ===== */
.zw-orbit {
  position: relative; width: 440px; height: 440px;
  margin: 20px auto;
}
@media (max-width: 500px) { .zw-orbit { width: 340px; height: 340px; } }
.zw-ring {
  position: absolute; inset: 20px;
  border-radius: 50%;
  border: 1.5px solid rgba(255, 193, 7, 0.12);
  box-shadow: 0 0 30px rgba(255, 193, 7, 0.08), inset 0 0 30px rgba(0, 229, 255, 0.03);
}
.zw-ring-2 {
  position: absolute; inset: 60px;
  border-radius: 50%;
  border: 1px dashed rgba(255,255,255,0.04);
}
.zw-center {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 60px; height: 60px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255, 176, 0, 0.2), rgba(255, 49, 49, 0.1));
  border: 1.5px solid rgba(255, 176, 0, 0.4);
  display: flex; align-items: center; justify-content: center; flex-direction: column;
  box-shadow: 0 0 30px rgba(255, 176, 0, 0.3);
}
.zw-center .center-icon { font-size: 18px; color: var(--wx-gold); }
.zw-center .center-text { font-size: 8px; color: var(--text-dim); letter-spacing: 2px; }

.zw-node {
  position: absolute; transform: translate(-50%, -50%);
  text-align: center; width: 70px; font-size: 9px;
  transition: var(--transition);
}
.zw-node.highlight {
  background: rgba(255, 193, 7, 0.06);
  border-radius: 6px;
  border: 1px dashed rgba(255, 193, 7, 0.25);
  padding: 4px;
  box-shadow: 0 0 10px rgba(255, 193, 7, 0.1);
}
.zw-node .n-name { font-weight: 700; font-size: 10px; color: var(--text-bright); }
.zw-node .n-gz { font-size: 8px; color: var(--text-dim); }
.zw-node .n-stars { font-size: 8px; line-height: 1.3; margin-top: 2px; }
.zw-node .n-stars .star { display: block; }
.zw-node .n-stars .star.main {
  color: var(--wx-red); font-weight: 600;
  text-shadow: 0 0 4px rgba(255, 49, 49, 0.4);
}
.zw-node .n-stars .star.aux { color: var(--text-dim); }
.zw-tag {
  display: inline-block; font-size: 7px; padding: 1px 4px;
  border-radius: 3px; margin: 0 1px;
}
.zw-tag.ming {
  background: rgba(255, 49, 49, 0.2); color: var(--wx-red);
}
.zw-tag.shen {
  background: rgba(0, 229, 255, 0.15); color: var(--wx-cyan);
}

/* ===== 空状态/加载 ===== */
.empty-state {
  text-align: center; padding: 80px 20px;
}
.empty-state .icon {
  font-size: 50px; margin-bottom: 14px;
  opacity: 0.4;
  animation: float 4s ease-in-out infinite;
}
.empty-state p {
  font-size: 12px; color: var(--text-dim); letter-spacing: 2px; line-height: 2;
}
.loading-state { text-align: center; padding: 60px; }
.loading-ring {
  width: 36px; height: 36px;
  border: 2px solid rgba(255,255,255,0.03);
  border-top-color: var(--wx-gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 14px;
  box-shadow: 0 0 20px rgba(255, 193, 7, 0.3);
}
@keyframes spin { to { transform: rotate(360deg); } }
.fade-in { animation: fadeIn 0.5s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* ===== Footer ===== */
.footer {
  text-align: center; padding: 28px;
  color: rgba(255,255,255,0.07);
  font-size: 10px; letter-spacing: 4px;
}

/* ===== 综合解读卡片 ===== */
.combined-card {
  margin-top: 32px;
  border-color: rgba(255, 107, 157, 0.12);
}
.combined-card::before {
  background: linear-gradient(90deg,
    transparent,
    #FF6B9D, #00E5FF, #FFC107, #00FF41, #FF3131,
    transparent
  );
  opacity: 0.5;
}
.combined-header {
  text-align: center;
  padding: 10px 0 20px;
}
.combined-header h2 {
  font-size: 22px;
  font-weight: 900;
  letter-spacing: 6px;
  background: linear-gradient(135deg, #FF6B9D, #00E5FF, #FFC107, #00FF41);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
}
.combined-header .sub {
  font-size: 10px;
  letter-spacing: 4px;
  color: var(--text-dim);
}

/* 生活维度卡片网格 */
.aspect-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;

<body>

<script>
// ============================================
// 星空粒子背景
// ============================================
(function() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.8 + 0.3,
      twinkle: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.02 + 0.005,
      opacity: Math.random() * 0.6 + 0.3,
    });
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.twinkle += s.speed;
      const alpha = s.opacity + Math.sin(s.twinkle) * 0.2;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,200,100,${alpha})`;
      ctx.fill();
      // Glow
      if (s.r > 1.2) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * 2.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,176,0,${alpha * 0.12})`;
        ctx.fill();
      }
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ============================================
// 药丸按钮
// ============================================
document.querySelectorAll('.neon-pills, .pills').forEach(group => {
  group.addEventListener('click', e => {
    const btn = e.target.closest('.neon-pill, .pill');
    if (!btn) return;
    group.querySelectorAll('.neon-pill, .pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// ============================================
// 模式切换
// ============================================
let currentMode = 'bazi';
function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.mode === mode);
  });
  const results = document.getElementById('results');
  if (results._lastData) {
    renderResults(results._lastData, results._lastFd);
  }
}

// 时辰映射
const SHI_CHEN_LIST = [
  {name:'子',range:'23:00-01:00', start:23, end:1},
  {name:'丑',range:'01:00-03:00', start:1, end:3},
  {name:'寅',range:'03:00-05:00', start:3, end:5},
  {name:'卯',range:'05:00-07:00', start:5, end:7},
  {name:'辰',range:'07:00-09:00', start:7, end:9},
  {name:'巳',range:'09:00-11:00', start:9, end:11},
  {name:'午',range:'11:00-13:00', start:11, end:13},
  {name:'未',range:'13:00-15:00', start:13, end:15},
  {name:'申',range:'15:00-17:00', start:15, end:17},
  {name:'酉',range:'17:00-19:00', start:17, end:19},
  {name:'戌',range:'19:00-21:00', start:19, end:21},
  {name:'亥',range:'21:00-23:00', start:21, end:23},
];

function getShiChen(hour) {
  const h = hour % 24;
  if (h === 23 || h === 0) return SHI_CHEN_LIST[0];
  for (let i = 1; i < SHI_CHEN_LIST.length; i++) {
    if (h >= SHI_CHEN_LIST[i].start && h < SHI_CHEN_LIST[i].end) return SHI_CHEN_LIST[i];
  }
  return SHI_CHEN_LIST[0];
}

function updateShiChenDisplay() {
  const dtVal = document.getElementById('birthday').value;
  if (!dtVal) return;
  const dt = new Date(dtVal);
  const sc = getShiChen(dt.getHours());
  document.getElementById('shichen-display').innerHTML = `
    <span class="sc-dot"></span>
    <span class="sc-text">${sc.name}时</span>
    <span class="sc-range">${sc.range}</span>
  `;
}

// 监听日期变更
document.getElementById('birthday').addEventListener('change', updateShiChenDisplay);
document.getElementById('birthday').addEventListener('input', updateShiChenDisplay);

function getFormData() {
  const dtVal = document.getElementById('birthday').value;
  let year, month, day, hour;
  if (dtVal) {
    const dt = new Date(dtVal);
    year = dt.getFullYear();
    month = dt.getMonth() + 1;
    day = dt.getDate();
    hour = dt.getHours();
  } else {
    year = month = day = hour = 0;
  }
  return {
    year, month, day, hour,
    gender: document.querySelector('#gender-pills .neon-pill.active').dataset.value,
    lunar: document.querySelector('#lunar-pills .neon-pill.active').dataset.value,
  };
}

// ============================================
// 主计算
// ============================================
async function calculate() {
  const fd = getFormData();
  if (!fd.year || !fd.month || !fd.day) return;

  const btn = document.querySelector('.submit-btn');
  btn.disabled = true;
  btn.textContent = '推算中...';

  const results = document.getElementById('results');
  results.classList.remove('visible');
  results.innerHTML = '<div class="loading-state"><div class="loading-ring"></div><p style="color:var(--text-dim);font-size:12px">正在连接命理矩阵...</p></div>';

  try {
    const resp = await fetch('/api/fortune', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: `year=${fd.year}&month=${fd.month}&day=${fd.day}&hour=${fd.hour}&gender=${fd.gender}&lunar=${fd.lunar}`
    });
    const data = await resp.json();
    results._lastData = data;
    results._lastFd = fd;
    renderResults(data, fd);
    results.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } catch (e) {
    results.innerHTML = `<div class="loading-state"><p style="color:var(--pink)">❌ 连接失败<br><small style="color:var(--text-dim)">请确保 python3 server.py 已启动</small></p></div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '开 始 推 算';
  }
}

function renderResults(data, fd) {
  const results = document.getElementById('results');
  results.innerHTML = '';
  if (currentMode === 'bazi') {
    results.appendChild(buildBaziCard(data.bazi, fd));
    if (data.bazi_analysis && !data.bazi_analysis.error) {
      results.appendChild(buildBaziAnalysisCard(data.bazi_analysis, data.bazi, fd));
    }
  } else {
    results.appendChild(buildZiweiCard(data.ziwei));
    if (data.ziwei_analysis && !data.ziwei_analysis.error) {
      results.appendChild(buildZiweiAnalysisCard(data.ziwei_analysis));
    }
  }
  // 综合解读卡片（按当前模式只显示对应体系）
  if (data.combined_analysis && !data.combined_analysis.error) {
    results.appendChild(buildCombinedAnalysisCard(data.combined_analysis, currentMode));
  }
  requestAnimationFrame(() => results.classList.add('visible'));
}

// ============================================
// 八字卡片
// ============================================
function buildBaziCard(bazi, fd) {
  const card = document.createElement('div');
  card.className = 'glass-card bazi-card fade-in';

  if (!bazi || bazi.error) {
    card.innerHTML = `<div class="section-label">⏣ 错误</div><p style="color:var(--pink)">${bazi?.error||'数据异常'}</p>`;
    return card;
  }

  const p = bazi.pillars;
  const wx = bazi.wu_xing;
  const maxWx = Math.max(...Object.values(wx), 1);
  const wxColors = { '金':'#FFC107','木':'#00FF41','水':'#00E5FF','火':'#FF3131','土':'#FFB000' };

  // 大运
  let dayunHtml = '';
  for (let i = 0; i < Math.min(bazi.da_yun.length, 8); i++) {
    const d = bazi.da_yun[i];
    dayunHtml += `<div class="dayun-item"><div class="dy-age">${d.age}岁</div><div class="dy-gz">${d.gz}</div></div>`;
  }

  // 五行
  let wxHtml = '';
  for (const [n, c] of Object.entries(wx)) {
    wxHtml += `<div class="wx-row">
      <span class="wx-name" style="color:${wxColors[n]}">${n}</span>
      <div class="wx-track"><div class="wx-fill" style="width:${c/maxWx*100}%;background:${wxColors[n]}"></div></div>
      <span class="wx-val">${c}</span>
    </div>`;
  }

  // 藏干
  let cgRows = '';
  for (const [k, v] of Object.entries(bazi.cang_gan_detail || {})) {
    const short = k.replace(/[年月日时]支/, '');
    cgRows += `<tr><td>${short}</td><td>${v.join(' · ')}</td></tr>`;
  }

  const strong = bazi.wu_xing[bazi.day_wx] >= 3 ? '偏旺' : '偏弱';

  card.innerHTML = `
    <div class="section-label">⏣ 四柱八字 · ${fd.gender==='male'?'乾造':'坤造'}</div>
    <div class="card-meta">
      <span>${fd.year}.${fd.month}.${fd.day}</span> · ${fd.hour}时 · 属<span>${bazi.sheng_xiao}</span> · 农历 <span>${bazi.lunar_date}</span>
      · 空亡 <span style="color:#FF3131">${(bazi.xun_kong||[]).join('、')}</span>
    </div>

    <div class="bazi-vert-table">
      <div class="bv-row bv-header">
        <div class="bv-label"></div><div class="bv-col">年柱</div><div class="bv-col">月柱</div><div class="bv-col">日柱</div><div class="bv-col">时柱</div>
      </div>
      <div class="bv-row bv-divider"></div>
      <div class="bv-row"><div class="bv-label">干支</div><div class="bv-col bv-ganzhi">${p.year}</div><div class="bv-col bv-ganzhi">${p.month}</div><div class="bv-col bv-ganzhi bv-day">${p.day}</div><div class="bv-col bv-ganzhi">${p.hour}</div></div>
      <div class="bv-row"><div class="bv-label">纳音</div><div class="bv-col bv-nayin">${bazi.na_yin['年']}</div><div class="bv-col bv-nayin">${bazi.na_yin['月']}</div><div class="bv-col bv-nayin">${bazi.na_yin['日']}</div><div class="bv-col bv-nayin">${bazi.na_yin['时']}</div></div>
      <div class="bv-row bv-divider"></div>
      <div class="bv-row"><div class="bv-label">十神</div><div class="bv-col">${bazi.shi_shen['年']}</div><div class="bv-col">${bazi.shi_shen['月']}</div><div class="bv-col">日主</div><div class="bv-col">${bazi.shi_shen['时']}</div></div>
      <div class="bv-row"><div class="bv-label">天干</div><div class="bv-col">${bazi.year_gan_wx||''}</div><div class="bv-col">${bazi.month_gan_wx||''}</div><div class="bv-col">${bazi.day_gan_wx||''}</div><div class="bv-col">${bazi.hour_gan_wx||''}</div></div>
      <div class="bv-row"><div class="bv-label">地支</div><div class="bv-col">${bazi.year_zhi_wx||''}</div><div class="bv-col">${bazi.month_zhi_wx||''}</div><div class="bv-col">${bazi.day_zhi_wx||''}</div><div class="bv-col">${bazi.hour_zhi_wx||''}</div></div>
      <div class="bv-row"><div class="bv-label">藏干</div><div class="bv-col bv-cang">${bazi.year_cang||''}</div><div class="bv-col bv-cang">${bazi.month_cang||''}</div><div class="bv-col bv-cang">${bazi.day_cang||''}</div><div class="bv-col bv-cang">${bazi.hour_cang||''}</div></div>
      <div class="bv-row"><div class="bv-label">地支<br>十神</div><div class="bv-col bv-dzss">${(bazi.di_zhi_shi_shen||{})['年']||''}</div><div class="bv-col bv-dzss">${(bazi.di_zhi_shi_shen||{})['月']||''}</div><div class="bv-col bv-dzss">${(bazi.di_zhi_shi_shen||{})['日']||''}</div><div class="bv-col bv-dzss">${(bazi.di_zhi_shi_shen||{})['时']||''}</div></div>
      <div class="bv-row"><div class="bv-label">长生</div><div class="bv-col">${(bazi.chang_sheng||{})['年']||''}</div><div class="bv-col">${(bazi.chang_sheng||{})['月']||''}</div><div class="bv-col">${(bazi.chang_sheng||{})['日']||''}</div><div class="bv-col">${(bazi.chang_sheng||{})['时']||''}</div></div>
      <div class="bv-row"><div class="bv-label">神煞</div><div class="bv-col bv-shensha">${((bazi.pillar_shen_sha||{})['年']||[]).join(', ')||'—'}</div><div class="bv-col bv-shensha">${((bazi.pillar_shen_sha||{})['月']||[]).join(', ')||'—'}</div><div class="bv-col bv-shensha">${((bazi.pillar_shen_sha||{})['日']||[]).join(', ')||'—'}</div><div class="bv-col bv-shensha">${((bazi.pillar_shen_sha||{})['时']||[]).join(', ')||'—'}</div></div>
    </div>

    <div class="info-row">
      <div class="info-item"><span class="label">日主</span><span class="value highlight">${bazi.day_master}</span></div>

    </div>

    <div class="wx-section">
      <div class="section-title">⏣ 五行分布</div>
      ${wxHtml}
    </div>

    <div class="wx-section">
      <div class="section-title">⏣ 大运排盘</div>

  return card;

// ============================================
// 八字分析卡片
// ============================================
function buildBaziAnalysisCard(analysis, bazi, fd) {
  const card = document.createElement('div');
  card.className = 'glass-card bazi-card fade-in';
  card.style.marginTop = '24px';

  const xi = analysis.xi_yong_shen || {};
  const ss = analysis.shi_shen_detail || [];
  const strength = analysis.strength || {};

  let html = `<div class="section-label">⏣ 八字命理分析</div>`;

  // 日主旺衰
  html += `<div class="info-row" style="margin-bottom:16px">
    <div class="info-item"><span class="label">日主旺衰</span>
      <span class="value" style="color:${strength.level==='旺'||strength.level==='偏旺'?'#FF3131':'#00E5FF'}">${strength.level}</span>
    </div>
    <div class="info-item"><span class="label">格局</span>
      <span class="value" style="color:#FFC107">${(analysis.ge_ju||[]).join('、')||'暂无'}</span>
    </div>
  </div>`;

  // 喜用神解读
  if (xi.first_yong_shen) {
    html += `<div class="wx-section"><div class="section-title">⏣ 喜用神解读</div>`;
    html += `<div style="font-size:13px;margin-bottom:10px">
      <span style="color:#FFC107;font-weight:800">▶ 第一用神：${xi.first_yong_shen}</span>
      &nbsp; 用神：${(analysis.yong_shen||[]).join('、')}
    </div>`;
    if (xi.supplement && xi.supplement.length) {
      html += `<div style="font-size:12px;color:var(--text);line-height:2;padding:12px;background:rgba(255,193,7,0.04);border-radius:8px;border:1px solid rgba(255,193,7,0.1)">`;
      for (const s of xi.supplement) {
        html += `<div>· ${s}</div>`;
      }
      html += `</div>`;
    }
    if (xi.avoid && xi.avoid.length) {
      html += `<div style="font-size:11px;color:var(--text-dim);margin-top:8px">`;
      for (const a of xi.avoid) html += `<div>⚠ ${a}</div>`;
      html += `</div>`;
    }
    html += `</div>`;
  }

  // 忌神规避（与喜用神同格式）
  const jiAvoid = analysis.ji_shen_avoid || {};
  if (jiAvoid.avoid_items && jiAvoid.avoid_items.length) {
    html += `<div class="wx-section"><div class="section-title">⏣ 忌神规避</div>`;
    html += `<div style="font-size:12px;color:var(--text);line-height:2;padding:12px;background:rgba(255,49,49,0.04);border-radius:8px;border:1px solid rgba(255,49,49,0.12)">`;
    for (const s of jiAvoid.avoid_items) {
      html += `<div>${s}</div>`;
    }
    html += `</div></div>`;
  }

  // 十神分析
  if (ss.length) {
    html += `<div class="wx-section"><div class="section-title">⏣ 十神分析</div>`;
    for (const s of ss) {
      const sc = s.strength==='强'?'#FF3131':s.strength==='中'?'#FFC107':'var(--text-dim)';
      html += `<div style="margin-bottom:12px;padding:10px;background:rgba(255,255,255,0.02);border-radius:6px;border-left:2px solid ${sc}">
        <div style="font-weight:700;font-size:13px;color:${sc}">${s.name} · ${s.strength} · ${s.positions ? s.positions.join('、')+'柱' : ''}</div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:4px">${s.meaning||''}</div>`;
      const li = s.life_impact || {};
      if (Object.keys(li).length) {
        html += `<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:6px;font-size:11px">`;
        for (const [k,v] of Object.entries(li)) {
          html += `<span style="color:var(--text)">${k}：${v}</span>`;
        }
        html += `</div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }

  // 大运简析
  if (analysis.da_yun_analysis && analysis.da_yun_analysis.length) {
    html += `<div class="wx-section"><div class="section-title">⏣ 大运简析</div><div class="dayun-grid">`;
    for (const dy of analysis.da_yun_analysis.slice(0, 8)) {
      html += `<div class="dayun-item">
        <div class="dy-age">${dy.age}岁</div>
        <div class="dy-gz">${dy.gz}</div>
        <div style="font-size:10px;color:var(--text-dim);margin-top:2px">${dy.gan_comment}</div>
      </div>`;
    }
    html += `</div></div>`;
  }

  card.innerHTML = html;
  return card;
}

// ============================================
// 紫微分析卡片
// ============================================
function buildZiweiAnalysisCard(analysis) {
  const card = document.createElement('div');
  card.className = 'glass-card bazi-card fade-in';
  card.style.marginTop = '24px';

  let html = `<div class="section-label">⏣ 紫微命盘分析</div>`;

  // 命宫格局
  if (analysis.ming_patterns && analysis.ming_patterns.length) {
    html += `<div class="wx-section"><div class="section-title">⏣ 命宫格局</div>`;
    for (const p of analysis.ming_patterns) {
      html += `<div style="font-size:12px;color:#FFC107;margin:4px 0">· ${p}</div>`;
    }
    html += `</div>`;
  }

  // 四化解读
  if (analysis.si_hua_analysis && analysis.si_hua_analysis.length) {
    html += `<div class="wx-section"><div class="section-title">⏣ 四化飞星</div>`;
    html += `<div class="sihua-bar">`;
    for (const sh of analysis.si_hua_analysis) {
      const clsMap = {'化禄':'badge-lu','化权':'badge-quan','化科':'badge-ke','化忌':'badge-ji'};
      html += `<span class="sihua-badge ${clsMap[sh.transform]}">${sh.star}${sh.transform} · ${sh.gong}</span>`;
    }
    html += `</div>`;
    for (const sh of analysis.si_hua_analysis) {
      html += `<div style="font-size:11px;color:var(--text);margin:4px 0;padding:4px 8px">· ${sh.interpretation}</div>`;
    }
    html += `</div>`;
  }

  // 重点宫位
  if (analysis.key_gongs && Object.keys(analysis.key_gongs).length) {
    html += `<div class="wx-section"><div class="section-title">⏣ 重点宫位</div>`;
    for (const [name, info] of Object.entries(analysis.key_gongs)) {
      html += `<div style="margin-bottom:12px;padding:10px;background:rgba(255,255,255,0.02);border-radius:6px;border-left:2px solid #00E5FF">
        <div style="font-weight:700;font-size:13px;color:#00E5FF">${name}</div>
        <div style="font-size:10px;color:var(--text-dim)">${info.description||''}</div>`;
      if (info.main_stars && info.main_stars.length) {
        html += `<div style="font-size:12px;margin-top:4px;color:#FF3131">主星：${info.main_stars.join('、')}</div>`;
      }
      if (info.san_fang_stars && info.san_fang_stars.length) {
        html += `<div style="font-size:11px;color:#FFC107">三方四正：${info.san_fang_stars.join('、')}</div>`;
      }
      if (info.patterns && info.patterns.length) {
        html += `<div style="font-size:10px;color:var(--text-dim);margin-top:2px">格局：${info.patterns.slice(0,2).join('、')}</div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }

  card.innerHTML = html;
  return card;
}


// ============================================
// 综合解读卡片 - 八字 vs 紫微双体系分开展示
// ============================================
function buildCombinedAnalysisCard(combined, mode) {
  const card = document.createElement('div');
  card.className = 'glass-card combined-card fade-in';
  
  const bd = combined || {};
  const isBazi = (mode === 'bazi');
  const sysLabel = isBazi ? '四柱八字' : '紫微斗数';
  const sysDesc = isBazi ? '天干地支 · 十神 · 五行' : '星曜 · 宫位 · 四化';

  let html = `<div class="combined-header">
    <h2>${sysLabel} · 命理解读</h2>
    <div class="sub">${sysDesc}</div>
  </div>`;
  
  html += `<div class="aspect-grid">`;
  
  const aspects = [
    { key: 'marriage', cls: 'aspect-marriage' },
    { key: 'career', cls: 'aspect-career' },
    { key: 'wealth', cls: 'aspect-wealth' },
    { key: 'children', cls: 'aspect-children' },
    { key: 'health', cls: 'aspect-health' },
  ];
  
  for (const {key, cls} of aspects) {
    const a = bd[key];
    if (!a) continue;
    
    const title = a.title || key;
    const icon = a.icon || '';
    const color = a.color || '#fff';
    const summary = a.summary || '';
    const careers = a.suitable_careers || [];
    const traits = a.wealth_traits || [];
    const organs = a.weak_organs || [];

    // 根据模式选择数据源
    const dataSource = isBazi ? (a.bazi || {}) : (a.ziwei || {});
    const sectionCls = isBazi ? 'bz-section' : 'zw-section';
    const emoji = isBazi ? '🪐' : '✨';
    
    html += `<div class="aspect-card ${cls}">
      <div class="aspect-title">
        <span class="icon">${icon}</span>
        <span class="name" style="color:${color}">${title}</span>
      </div>`;
    
    if (summary) {
      html += `<div class="aspect-summary">▶ ${summary}</div>`;
    }

    if (dataSource.details && dataSource.details.length) {
      html += `<div class="sub-section ${sectionCls}">
        <!-- sub-label removed -->`;
      html += `<div class="aspect-details">`;
      for (const d of dataSource.details) {
        html += `<div class="d-item">· ${d}</div>`;
      }
      html += `</div>`;
      if (dataSource.advice && dataSource.advice.length) {
        html += `<div class="aspect-advice" style="margin-top:6px">`;
        for (const adv of dataSource.advice) {
          html += `<div class="a-item">💡 ${adv}</div>`;
        }
        html += `</div>`;
      }
      html += `</div>`;
    }
    
    if (careers.length) {
      html += `<div class="aspect-tags">${careers.map(c => `<span class="aspect-tag">${c}</span>`).join('')}</div>`;
    }
    if (traits.length) {
      html += `<div class="aspect-tags">${traits.map(t => `<span class="aspect-tag">${t}</span>`).join('')}</div>`;
    }
    if (organs.length) {
      html += `<div class="aspect-tags">${organs.map(o => `<span class="weak-organ-tag">⚠ ${o}</span>`).join('')}</div>`;
    }
    
    html += `</div>`;
  }
  
  html += `</div>`;
  
  card.innerHTML = html;
  return card;
}

function buildZiweiCard(ziwei) {
  const card = document.createElement('div');
  card.className = 'glass-card ziwei-card fade-in';

  if (!ziwei || ziwei.error) {
    card.innerHTML = `<div class="section-label">⏣ 错误</div><p style="color:var(--pink)">${ziwei?.error||'数据异常'}</p>`;
    return card;
  }

  const mainStars = new Set(['紫微','天机','太阳','武曲','天同','廉贞','天府','太阴','贪狼','巨门','天相','天梁','七杀','破军']);
  const gongMap = {};
  ziwei.gongs.forEach(g => { gongMap[g.zhi] = g; });

  // 12宫角度
  const posMap = {
    '巳':300,'午':330,'未':0,'申':30,
    '辰':270,'酉':60,
    '卯':240,'戌':90,
    '寅':210,'丑':180,'子':150,'亥':120,
  };
  const cx = 220, cy = 220, r = 150;

  let nodesHtml = '';
  for (const zhi of Object.keys(posMap)) {
    const g = gongMap[zhi];
    if (!g) continue;
    const angle = posMap[zhi];
    const rad = angle * Math.PI / 180;
    const x = cx + r * Math.sin(rad);
    const y = cy - r * Math.cos(rad);
    const isImp = g.is_ming || g.is_shen;

    let starsHtml = '';
    g.stars.forEach(s => {
      const clean = s.replace(/^[禄权科忌]/,'');
      const isMain = mainStars.has(clean);
      let cls = isMain ? 'main' : 'aux';
      if (s.startsWith('禄')) cls = 'main';
      if (s.startsWith('权')) cls = 'main';
      if (s.startsWith('科')) cls = 'main';
      if (s.startsWith('忌')) cls = 'main';
      starsHtml += `<span class="star ${cls}">${s}</span>`;
    });

    let tags = '';
    if (g.is_ming) tags += '<span class="zw-tag ming">命</span>';
    if (g.is_shen) tags += '<span class="zw-tag shen">身</span>';

    nodesHtml += `<div class="zw-node${isImp?' highlight':''}" style="left:${x}px;top:${y}px">
      <div class="n-name">${g.name} ${tags}</div>
      <div class="n-gz">${g.gz} (${zhi})</div>
      <div class="n-stars">${starsHtml||'<span class="star aux">—</span>'}</div>
    </div>`;
  }

  let sihuaHtml = '';
  if (ziwei.si_hua) {
    const clsMap = {'化禄':'badge-lu','化权':'badge-quan','化科':'badge-ke','化忌':'badge-ji'};
    for (const [k, v] of Object.entries(ziwei.si_hua)) {
      if (!v) continue;
      sihuaHtml += `<span class="sihua-badge ${clsMap[k]}">${k}: ${v}</span>`;
    }
  }

  card.innerHTML = `
    <div class="section-label">⏣ 紫微斗数</div>
    <div class="zw-meta">
      命宫 <span class="hl">${ziwei.ming_gong}</span> · 五行局 <span class="hl">${ziwei.wx_ju}</span> · 身宫 <span class="hl">${ziwei.shen_gong_name}</span>
    </div>
    <div class="sihua-bar">${sihuaHtml}</div>
    <div class="zw-orbit">
      <div class="zw-ring"></div>
      <div class="zw-ring-2"></div>
      <div class="zw-center">
        <span class="center-icon">✦</span>
        <span class="center-text">命盘</span>
      </div>
      ${nodesHtml}
    </div>`;
  return card;
}
